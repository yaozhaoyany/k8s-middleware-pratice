---
# -------------------------------------------------------------
# 为什么用 Ansible 装基础软件？(Educational Note)
# -------------------------------------------------------------
# 在云原生的 "不可变基础设施 (Immutable Infrastructure)" 架构中，
# 服务器一旦启动就不应该被人类通过 SSH 登录去纯手工敲命令装依赖。
# 我们用 Ansible 固化所有前置核心组件（Docker, kubectl, kind, helm），
# 确保在任何一台新装的 Ubuntu 服务器 (或 WSL) 上跑这套脚本，都能得到 100% 环境一致的底座。
# 这彻底消除了 "在这台机器能跑，那台机器不能跑" 的玄学问题。

# -------------------------------------------------------------
# 为什么要加重试机制？(Educational Note)
# -------------------------------------------------------------
# 在 WSL + 代理(Clash) 的网络环境下，网络连接可能不稳定，
# SSL 握手超时、DNS 解析抖动等问题经常发生。
# Ansible 的 retries + delay + until 机制可以自动重试失败的任务，
# 避免因为一次偶发网络波动而导致整个部署脚本失败。
#
# 为了避免每个 task 都重复写 retries/delay/until，我们把重试参数
# 集中定义在 defaults/main.yml 中（network_retries, network_delay, download_timeout），
# 然后在需要重试的 task 里用 {{ network_retries }} 引用。
# 只需改一处，所有 task 的重试策略就统一更新了。

# -------------------------------------------------------------
# 为什么要换 APT 源？(Educational Note)
# -------------------------------------------------------------
# Ubuntu 默认使用 archive.ubuntu.com，服务器在海外，
# 国内直连下载速度极慢（几 KB/s），安装 Maven、JDK 等大包时尤其痛苦。
# 换成清华 TUNA 镜像后，走国内 CDN，速度可以达到几十 MB/s。

- name: Switch apt sources to TUNA mirror (国内加速)
  replace:
    path: /etc/apt/sources.list
    regexp: 'http://archive\.ubuntu\.com/ubuntu'
    replace: 'https://mirrors.tuna.tsinghua.edu.cn/ubuntu'
  register: _apt_mirror

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: "{{ 0 if _apt_mirror.changed else 3600 }}"
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Install prerequisite packages for Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Add Docker Repository (assuming Ubuntu focal/jammy)
  apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu focal stable
    state: present

- name: Install Docker CE
  apt:
    name: docker-ce
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Ensure Docker service is running
  service:
    name: docker
    state: started
    enabled: yes

# -------------------------------------------------------------
# 为什么要单独处理 Docker 权限？(Educational Note)
# -------------------------------------------------------------
# Docker 的核心通信管道是一个 Unix Socket 文件: /var/run/docker.sock
# 默认情况下，这个文件只允许 root 用户和 docker 用户组的成员读写。
# 如果当前用户（比如你的 tony-yao1）不在 docker 组里，
# 那么 Terraform 的 Kind Provider 在尝试连接 Docker 创建集群容器时，
# 就会被操作系统无情地踢出来，报出经典的 "permission denied" 错误。
# 下面这两步确保了"一键部署"在任何新机器上都不会卡在权限问题上。

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add current user to docker group (避免每次都要 sudo)
  user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: yes

- name: Fix docker socket permissions (仅限开发实验室使用，生产环境严禁！)
  file:
    path: /var/run/docker.sock
    mode: '0666'

- name: Download Kind binary (K8s in Docker)
  get_url:
    url: "https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: '0755'
    timeout: "{{ download_timeout }}"
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Download Kubectl binary (K8s CLI client)
  get_url:
    url: "https://dl.k8s.io/release/v1.29.3/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
    timeout: "{{ download_timeout }}"
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Download Helm installer script (K8s Package Manager)
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0700'
    timeout: "{{ download_timeout }}"
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Execute Helm installer script
  command: /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm

- name: Add HashiCorp GPG apt Key
  apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Add HashiCorp Repository
  apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
    state: present

- name: Install Terraform CLI
  apt:
    name: terraform
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Install Java JDK 17 (Required for Spring Boot / Maven)
  apt:
    name: openjdk-17-jdk
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"

- name: Install Maven (Required for building Java microservices)
  apt:
    name: maven
    state: present
  register: _result
  until: _result is success
  retries: "{{ network_retries }}"
  delay: "{{ network_delay }}"
