# =============================================================
# Kafka 集群自定义资源 (Strimzi CR) - Helm 模板 (Educational Note)
# =============================================================
# 这个模板会被 Helm 渲染成一个 Strimzi Kafka CR。
# {{ .Values.xxx }} 语法从 values.yaml 里动态读取参数。
# 这就是 Helm 的核心魔法：同一套模板 + 不同的 values = 不同环境的部署。
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ .Values.kafka.clusterName }}
  namespace: {{ .Release.Namespace }}
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    replicas: {{ .Values.kafka.replicas }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # 【关键参数】单 Broker 环境下，所有副本因子必须为 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    storage:
      type: {{ .Values.kafka.storageType }}
    resources:
      requests:
        memory: {{ .Values.kafka.resources.requests.memory }}
      limits:
        memory: {{ .Values.kafka.resources.limits.memory }}
  zookeeper:
    replicas: {{ .Values.zookeeper.replicas }}
    storage:
      type: {{ .Values.zookeeper.storageType }}
    resources:
      requests:
        memory: {{ .Values.zookeeper.resources.requests.memory }}
      limits:
        memory: {{ .Values.zookeeper.resources.limits.memory }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
