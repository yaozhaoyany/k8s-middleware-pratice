# =============================================================
# Kafka 集群配置参数 (Educational Note)
# =============================================================
# 这是 Helm Chart 的 values.yaml —— 所有可调节的"旋钮"都在这里。
# 使用者可以通过 --set 或自定义 values 文件来覆盖这些默认值。

kafka:
  clusterName: orders-cluster
  version: "4.2.0"

nodePool:
  name: dual-role
  replicas: 1             # 本地 Kind 资源有限，先用单节点既做 Controller 又做 Broker
  storageType: ephemeral  # 本地用临时存储（生产应该用 persistent-claim）
  resources:
    requests:
      memory: "512Mi"
    limits:
      memory: "1Gi"

topic:
  name: orders
  partitions: 3            # 3 个分区，为后续消费者并行消费做准备
  replicas: 1              # 单 Broker 只能 1 副本
  retentionMs: "604800000" # 消息保留 7 天
