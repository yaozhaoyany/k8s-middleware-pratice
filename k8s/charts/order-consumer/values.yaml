# =============================================================
# order-consumer 微服务配置参数
# =============================================================

replicaCount: 1

image:
  repository: order-consumer
  tag: latest
  # Kind 集群中一般直接 load 进节点，所以设为 Never
  pullPolicy: Never

service:
  type: ClusterIP
  port: 9082

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# K8s 健康检查探针配置
probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 40
    periodSeconds: 10
  readiness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 5

# Kafka 连接配置
kafka:
  bootstrapServers: orders-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092

# PostgreSQL 连接配置
postgres:
  host: postgresql-primary.database.svc.cluster.local
  port: "5432"
  user: postgres
  password: postgres123
  database: orders
