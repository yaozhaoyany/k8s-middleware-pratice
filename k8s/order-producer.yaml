# =============================================================
# order-producer K8s 部署清单 (Educational Note)
# =============================================================
# 为什么用 K8s YAML 而不是继续用 Terraform？
# 这遵循了我们在 Day 1 确立的分层原则：
# - Terraform 管"基础设施插件"(PG/Redis/Kafka 这些长期稳定的底座)
# - 业务微服务（频繁迭代）由 K8s YAML + CI/CD 流水线管理
# 后续 Day 10 可以引入 ArgoCD (GitOps) 来自动同步这些 YAML。
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-producer
  namespace: default
  labels:
    app: order-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-producer
  template:
    metadata:
      labels:
        app: order-producer
    spec:
      containers:
        - name: order-producer
          image: order-producer:latest
          # imagePullPolicy: Never 是 Kind 集群的特殊配置！
          # 因为 Kind 运行在 Docker 内部，它无法访问外部的 Docker Registry。
          # 我们需要先用 `kind load docker-image` 命令把本地镜像"注入"到 Kind 节点里，
          # 然后设置 Never 告诉 K8s "不要去远程拉，本地已经有了"。
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          # 【K8s 健康检查探针】(Educational Note)
          # livenessProbe：存活探针。K8s 定期戳这个端点，如果连续失败，直接杀掉 Pod 重建。
          # 用于检测"死锁"等应用假死状态。
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          # readinessProbe：就绪探针。只有这个探针通过，K8s 才会把流量导入这个 Pod。
          # 用于确保"应用已经完全启动并且能正常处理请求"。
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: order-producer
  namespace: default
spec:
  selector:
    app: order-producer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
